version: '3.8'

services:
  umfrage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umfrage-tool
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      # Datenbank persistent speichern
      - umfrage-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  umfrage-data:
    driver: local
